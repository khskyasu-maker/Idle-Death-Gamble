name: Daily Pachinko Report

on:
  schedule:
    - cron: '0 22 * * *' # UTC 22:00 -> KST/JST 07:00
  workflow_dispatch: # 수동 실행 지원

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Collect Script
        run: python scripts/collect.py
        env:
          USE_PLAYWRIGHT: false

      - name: Run Analyze Script
        run: python scripts/analyze.py

      - name: Run Build Report Script
        run: python scripts/build_report.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git commit -m "daily pachinko report" || echo "No changes to commit"
          git push origin main
